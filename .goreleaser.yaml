version: 2

project_name: devspace

builds:
  - id: devspace
    main: ./cmd/devspace
    binary: devspace
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version=v{{ .Version }}

kos:
  - id: devspace-hosted
    build: devspace
    # Pinned for reproducible builds. chainguard rotates :latest and GCs old
    # digests, so refresh this periodically:
    #   docker buildx imagetools inspect cgr.dev/chainguard/static:latest --format '{{.Manifest.Digest}}'
    base_image: cgr.dev/chainguard/static:latest@sha256:77d8b8925dc27970ec2f48243f44c7a260d52c49cd778288e4ee97566e0cb75b
    repositories:
      - ghcr.io/liatrio-forge/devspace-hosted
    platforms:
      - linux/amd64
      - linux/arm64
    tags:
      - "{{ .Tag }}"
      # only move `latest` for stable releases, not prereleases (rc/beta)
      - "{{ if not .Prerelease }}latest{{ end }}"
    labels:
      org.opencontainers.image.source: https://github.com/HexSleeves/devspace
      org.opencontainers.image.description: DevSpace hosted manifest sync server

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_v{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - src: README.md
      - src: docs/release.md
        dst: RELEASE.md

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  groups:
    - title: Features
      regexp: '^feat(\(.*\))?!?:'
      order: 0
    - title: Bug Fixes
      regexp: '^fix(\(.*\))?!?:'
      order: 1
    - title: Others
      order: 999
  filters:
    exclude:
      - "^docs"
      - "^chore"
      - "^test"

release:
  prerelease: auto
