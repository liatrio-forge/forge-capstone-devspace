name: release-check

on:
  pull_request:
    paths:
      - .goreleaser.yaml
      - .github/workflows/release*.yml
      - Makefile
      - cmd/devspace/**
      - go.mod
      - go.sum
      - internal/devspace/**
      - scripts/verify-release-archives*.sh
      - tui/**

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Test release archive validator
        run: scripts/verify-release-archives_test.sh

      - name: Build devspace-tui companion binaries
        run: make tui-build-all

      - name: GoReleaser snapshot dry-run
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --snapshot --clean --skip=publish

      - name: Verify release archive contents
        run: scripts/verify-release-archives.sh dist
