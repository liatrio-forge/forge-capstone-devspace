name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          # v2.1.x builds (including v2.1.6) were built with a Go toolchain
          # older than this repo's go 1.26 target and refuse to run
          # ("Go language version used to build golangci-lint is lower than
          # the targeted Go version"). v2.12.2 is confirmed built with go1.26.4.
          version: v2.12.2
          args: --timeout 5m

      - name: Vulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...

      - name: Build
        run: go build -trimpath -o bin/devspace ./cmd/devspace

  mount-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install FUSE
        run: |
          if ! command -v fusermount3 >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y fuse3
          fi
          test -e /dev/fuse
          fusermount3 --version
          sudo chmod a+rw /dev/fuse

      - name: Test FUSE mount
        run: go test ./internal/devspace -tags fusetest -v
