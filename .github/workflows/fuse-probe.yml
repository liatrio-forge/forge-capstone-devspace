name: fuse-probe

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  fuse-probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Probe FUSE support
        shell: bash
        run: |
          set -euxo pipefail
          echo "ImageOS=${ImageOS:-unknown}"
          echo "ImageVersion=${ImageVersion:-unknown}"
          uname -a
          id
          test -e /dev/fuse
          ls -l /dev/fuse
          if ! command -v fusermount3 >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y fuse3
          fi
          fusermount3 --version
          sudo chmod a+rw /dev/fuse

          probe="$RUNNER_TEMP/fuse-probe"
          mkdir -p "$probe"
          cd "$probe"
          go mod init fuseprobe
          go get github.com/hanwen/go-fuse/v2@v2.10.1
          cat > main.go <<'EOF'
          package main

          import (
          	"fmt"
          	"os"
          	"path/filepath"
          	"time"

          	"github.com/hanwen/go-fuse/v2/fs"
          	"github.com/hanwen/go-fuse/v2/fuse"
          )

          func main() {
          	root := os.Getenv("RUNNER_TEMP")
          	src := filepath.Join(root, "fuse-src")
          	mnt := filepath.Join(root, "fuse-mnt")
          	if err := os.RemoveAll(src); err != nil {
          		panic(err)
          	}
          	if err := os.RemoveAll(mnt); err != nil {
          		panic(err)
          	}
          	if err := os.MkdirAll(src, 0o755); err != nil {
          		panic(err)
          	}
          	if err := os.MkdirAll(mnt, 0o755); err != nil {
          		panic(err)
          	}
          	if err := os.WriteFile(filepath.Join(src, "hello.txt"), []byte("fuse ok\n"), 0o644); err != nil {
          		panic(err)
          	}
          	loopbackRoot, err := fs.NewLoopbackRoot(src)
          	if err != nil {
          		panic(err)
          	}
          	sec := time.Second
          	server, err := fs.Mount(mnt, loopbackRoot, &fs.Options{
          		AttrTimeout:  &sec,
          		EntryTimeout: &sec,
          		MountOptions: fuse.MountOptions{
          			FsName: "devspace-fuse-probe",
          			Name:   "devspace-fuse-probe",
          			Options: []string{
          				"ro",
          			},
          		},
          	})
          	if err != nil {
          		panic(err)
          	}
          	defer server.Unmount()

          	entries, err := os.ReadDir(mnt)
          	if err != nil {
          		panic(err)
          	}
          	for _, entry := range entries {
          		fmt.Println("entry:", entry.Name())
          	}
          	data, err := os.ReadFile(filepath.Join(mnt, "hello.txt"))
          	if err != nil {
          		panic(err)
          	}
          	fmt.Printf("read: %s", data)
          	if err := server.Unmount(); err != nil {
          		panic(err)
          	}
          	fmt.Println("unmounted")
          }
          EOF
          go mod tidy
          go run .
