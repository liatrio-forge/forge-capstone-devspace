name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # RELEASE_PLEASE_TOKEN must be a fine-grained PAT (Contents + Pull requests
      # write) or a GitHub App token — NOT the default GITHUB_TOKEN. A tag pushed
      # with GITHUB_TOKEN does not trigger other workflows (Actions anti-recursion),
      # so release.yml would never fire on the release-please tag.
      - uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
